name: DevSecOps Pipeline

on:
  pull_request:
    branches:
      - main
      - develop

  push:
    branches:
      - main
      - develop

jobs:
  devsecops-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Checkout do código
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Node.js (exemplo)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Instala dependências
      - name: Install Dependencies
        run: npm install

      # Lint
      - name: Run Lint
        run: npm run lint

      # Testes unitários
      - name: Run Unit Tests
        run: npm test

      # =========================
      # SECRET SCAN
      # =========================
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

      # =========================
      # SAST - SEMGREP
      # =========================
      - name: Run Semgrep SAST
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto

      # =========================
      # DEPENDENCY SCAN
      # =========================
      - name: Run Dependency Audit
        run: npm audit --audit-level=high

      # =========================
      # BUILD DOCKER IMAGE
      # =========================
      - name: Build Docker Image
        run: docker build -t myapp:${{ github.sha }} .

      # =========================
      # CONTAINER SCAN - TRIVY
      # =========================
      - name: Run Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: myapp:${{ github.sha }}
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL

      # =========================
      # DOCKERFILE BEST PRACTICES
      # =========================
      - name: Run Dockle
        uses: goodwithtech/dockle-action@main
        with:
          image: myapp:${{ github.sha }}
          exit-code: 1
          failure-threshold: WARN

      # =========================
      # DEPLOY HOMOLOG
      # =========================
      - name: Deploy to Homolog
        if: github.ref == 'refs/heads/develop'
        run: |
          echo "Deploying to homolog environment..."

      # =========================
      # DAST - OWASP ZAP
      # =========================
      - name: OWASP ZAP Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: "https://staging.example.com"

      # =========================
      # APPROVAL / POLICY CHECK
      # =========================
      - name: Security Policy Check
        run: |
          echo "Validating security policies..."
          echo "Blocking only HIGH and CRITICAL findings"

      # =========================
      # DEPLOY PRODUÇÃO
      # =========================
      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying to production..."

      # =========================
      # OBSERVABILITY
      # =========================
      - name: Send Deployment Event
        run: |
          echo "Sending deployment metrics/logs to observability platform..."